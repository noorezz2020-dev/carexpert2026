<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Expert - إعادة تعيين كلمة المرور</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(rgba(15,23,42,0.78), rgba(15,23,42,0.88)), url('/static/login-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 30%),
                        radial-gradient(circle at bottom left, rgba(37,99,235,0.18), transparent 30%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            width: 100%;
            max-width: 460px;
            padding: 45px 40px;
            animation: fadeIn 0.5s ease;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            color: white;
        }

        .logo-text span {
            color: #3b82f6;
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
            color: white;
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 35px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e2e8f0;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-family: inherit;
            font-size: 15px;
            color: white;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            color: #3b82f6;
        }

        .error-message {
            background: rgba(239,68,68,0.2);
            color: #fca5a5;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            border: 1px solid rgba(239,68,68,0.3);
            font-size: 14px;
        }

        .success-message {
            background: rgba(34,197,94,0.15);
            color: #86efac;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            border: 1px solid rgba(34,197,94,0.3);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 25px;
            }
            .logo-text {
                font-size: 26px;
            }
            .title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <img src="/static/logo.png" class="logo-img" alt="Logo" onerror="this.style.display='none'">
            <div class="logo-text">Car<span>Expert</span></div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <div class="title">إعادة تعيين كلمة المرور</div>
        <div class="subtitle">أدخل كلمة المرور الجديدة</div>
        
        <div class="form-group">
            <label>كلمة المرور الجديدة</label>
            <input type="password" id="newPassword" placeholder="********">
        </div>
        <div class="form-group">
            <label>تأكيد كلمة المرور</label>
            <input type="password" id="confirmPassword" placeholder="********">
        </div>
        
        <button class="btn-primary" onclick="resetPassword()">تأكيد التغيير</button>
        
        <div class="back-link">
            <a href="auth.html">← العودة إلى تسجيل الدخول</a>
        </div>
    </div>

    <script>
        function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = localStorage.getItem('resetEmail');
            
            if (!newPassword || !confirmPassword) {
                showError('❌ الرجاء إدخال كلمة المرور');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showError('❌ كلمة المرور غير متطابقة');
                return;
            }
            
            if (newPassword.length < 6) {
                showError('❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            // تحديث كلمة المرور
            let users = JSON.parse(localStorage.getItem('carServeUsers') || '[]');
            const userIndex = users.findIndex(u => u.email === email);
            
            if (userIndex !== -1) {
                users[userIndex].password = btoa(newPassword);
                localStorage.setItem('carServeUsers', JSON.stringify(users));
            }
            
            // تنظيف بيانات reset
            localStorage.removeItem('resetEmail');
            if (email) {
                localStorage.removeItem('resetCode_' + email);
            }
            
            showSuccess('✅ تم تغيير كلمة المرور بنجاح! جاري التحويل...');
            
            setTimeout(() => {
                window.location.href = 'auth.html';
            }, 2000);
        }
        
        function showError(msg) {
            const div = document.getElementById('errorMessage');
            div.textContent = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
        
        function showSuccess(msg) {
            const div = document.getElementById('successMessage');
            div.textContent = msg;
            div.style.display = 'block';
        }
    </script>
</body>
</html>
