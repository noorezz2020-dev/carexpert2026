<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Expert - الصفحة غير موجودة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        .code { font-size: 120px; font-weight: 800; color: #3b82f6; margin-bottom: 20px; }
        h1 { font-size: 32px; margin-bottom: 15px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .btn {
            background: #3b82f6; color: white; padding: 12px 30px; border-radius: 40px;
            text-decoration: none; display: inline-block; transition: transform 0.3s;
        }
        .btn:hover { transform: scale(1.05); background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>عذراً، الصفحة غير موجودة</h1>
        <p>الصفحة التي تبحث عنها قد تكون تمت إزالتها أو أن الرابط غير صحيح</p>
        <a href="/" class="btn">🏠 العودة إلى الرئيسية</a>
    </div>
</body>
</html>
