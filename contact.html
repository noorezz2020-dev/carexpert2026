<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Expert - تواصل معنا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(rgba(15,23,42,0.78), rgba(15,23,42,0.88)), url('/static/login-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding: 40px 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 30%),
                        radial-gradient(circle at bottom left, rgba(37,99,235,0.18), transparent 30%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: white;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
        }

        .info-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 30px;
            transition: transform 0.3s;
        }

        .info-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.12);
        }

        .info-card h2 {
            color: white;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .info-item:hover {
            transform: translateX(-5px);
            background: rgba(255,255,255,0.1);
            border-color: rgba(59,130,246,0.4);
        }

        .info-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .info-text h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: white;
        }

        .info-text p {
            color: #cbd5e1;
            direction: ltr;
        }

        .map {
            height: 250px;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e2e8f0;
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            font-family: inherit;
            font-size: 15px;
            color: white;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
        }

        .form-group input::placeholder, .form-group textarea::placeholder {
            color: #94a3b8;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
        }

        .back-link {
            text-align: center;
            padding: 25px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .back-link a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-link a:hover {
            color: #3b82f6;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                padding: 20px;
                gap: 25px;
            }
            .header h1 { font-size: 28px; }
            .info-card h2 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📞 تواصل معنا</h1>
            <p>نحن هنا لخدمتك على مدار الساعة</p>
        </div>
        <div class="content">
            <div class="info-card">
                <h2>📍 معلومات الاتصال</h2>
                <div class="info-item">
                    <div class="info-icon">📞</div>
                    <div class="info-text"><h3>الهاتف</h3><p dir="ltr">+20 1090110417</p></div>
                </div>
                <div class="info-item">
                    <div class="info-icon">✉️</div>
                    <div class="info-text"><h3>البريد الإلكتروني</h3><p>ramzyh74@gmail.com</p></div>
                </div>
                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <div class="info-text"><h3>العنوان</h3><p>القاهرة، مصر</p></div>
                </div>
                <div class="info-item">
                    <div class="info-icon">⏰</div>
                    <div class="info-text"><h3>ساعات العمل</h3><p>السبت - الخميس: 9 ص - 12 ص</p></div>
                </div>
                <div class="map" id="map"></div>
            </div>
            <div class="info-card">
                <h2>📝 أرسل رسالة</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" id="contactName" required placeholder="أدخل اسمك">
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="contactEmail" required placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" id="contactPhone" required placeholder="05xxxxxxxx">
                    </div>
                    <div class="form-group">
                        <label>الموضوع</label>
                        <input type="text" id="contactSubject" required placeholder="موضوع الرسالة">
                    </div>
                    <div class="form-group">
                        <label>الرسالة</label>
                        <textarea id="contactMessage" rows="5" required placeholder="اكتب رسالتك هنا..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary">إرسال الرسالة</button>
                </form>
            </div>
        </div>
        <div class="back-link">
            <a href="/dashboard.html">← العودة إلى لوحة التحكم</a>
        </div>
    </div>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        setTimeout(() => {
            if (typeof L !== 'undefined') {
                var map = L.map('map').setView([30.0444, 31.2357], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                var customIcon = L.divIcon({
                    html: '<div style="background: linear-gradient(135deg, #3b82f6, #2563eb); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">📍</div>',
                    iconSize: [40, 40],
                    popupAnchor: [0, -20]
                });
                L.marker([30.0444, 31.2357], { icon: customIcon }).addTo(map).bindPopup('<b>📍 Car Expert</b><br>القاهرة، مصر').openPopup();
            } else {
                document.getElementById('map').innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border-radius:20px; color:#cbd5e1;">📍 القاهرة، مصر</div>';
            }
        }, 100);
        
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('✅ تم إرسال رسالتك بنجاح! سنتواصل معك قريباً.');
            e.target.reset();
        });
    </script>
</body>
</html>
