<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Expert - تأكيد الرمز</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(rgba(15,23,42,0.78), rgba(15,23,42,0.88)), url('/static/login-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 30%),
                        radial-gradient(circle at bottom left, rgba(37,99,235,0.18), transparent 30%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            width: 100%;
            max-width: 500px;
            padding: 45px 40px;
            animation: fadeIn 0.5s ease;
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            color: white;
        }

        .logo-text span {
            color: #3b82f6;
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
            color: white;
        }

        .subtitle {
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 35px;
            font-size: 14px;
        }

        .error-message {
            background: rgba(239,68,68,0.2);
            color: #fca5a5;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            border: 1px solid rgba(239,68,68,0.3);
            font-size: 14px;
        }

        .code-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .code-inputs input {
            width: 55px;
            height: 65px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 18px;
            font-family: monospace;
            color: white;
            transition: all 0.3s;
        }

        .code-inputs input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            color: #3b82f6;
        }

        @media (max-width: 640px) {
            .container {
                padding: 30px 25px;
            }
            .logo-text {
                font-size: 26px;
            }
            .title {
                font-size: 22px;
            }
            .code-inputs {
                gap: 8px;
            }
            .code-inputs input {
                width: 45px;
                height: 55px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <img src="/static/logo.png" class="logo-img" alt="Logo" onerror="this.style.display='none'">
            <div class="logo-text">Car<span>Expert</span></div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="title">أدخل رمز التحقق</div>
        <div class="subtitle">تم إرسال الرمز إلى بريدك الإلكتروني</div>
        
        <div class="code-inputs">
            <input type="text" maxlength="1" id="code1" onkeyup="moveFocus(1, this.value)" onkeydown="handleBackspace(1, event)">
            <input type="text" maxlength="1" id="code2" onkeyup="moveFocus(2, this.value)" onkeydown="handleBackspace(2, event)">
            <input type="text" maxlength="1" id="code3" onkeyup="moveFocus(3, this.value)" onkeydown="handleBackspace(3, event)">
            <input type="text" maxlength="1" id="code4" onkeyup="moveFocus(4, this.value)" onkeydown="handleBackspace(4, event)">
            <input type="text" maxlength="1" id="code5" onkeyup="moveFocus(5, this.value)" onkeydown="handleBackspace(5, event)">
            <input type="text" maxlength="1" id="code6" onkeyup="moveFocus(6, this.value)" onkeydown="handleBackspace(6, event)">
        </div>
        
        <button class="btn-primary" onclick="verifyCode()">تأكيد الرمز</button>
        
        <div class="back-link">
            <a href="forget-password.html">← إعادة إرسال الرمز</a>
        </div>
    </div>

    <script>
        function moveFocus(index, value) {
            if (value.length === 1 && index < 6) {
                document.getElementById(`code${index + 1}`).focus();
            }
        }
        
        function handleBackspace(index, event) {
            if (event.key === 'Backspace' && index > 1) {
                const currentInput = document.getElementById(`code${index}`);
                if (currentInput.value === '') {
                    document.getElementById(`code${index - 1}`).focus();
                }
            }
        }
        
        function getCode() {
            let code = '';
            for (let i = 1; i <= 6; i++) {
                code += document.getElementById(`code${i}`).value;
            }
            return code;
        }
        
        function verifyCode() {
            const code = getCode();
            const email = localStorage.getItem('resetEmail');
            
            if (code.length !== 6) {
                showError('❌ الرجاء إدخال الرمز المكون من 6 أرقام');
                return;
            }
            
            const savedCode = localStorage.getItem('resetCode_' + email);
            
            if (!savedCode || code !== savedCode) {
                showError('❌ الرمز غير صحيح. حاول مرة أخرى');
                return;
            }
            
            window.location.href = 'reset-password.html';
        }
        
        function showError(msg) {
            const div = document.getElementById('errorMessage');
            div.textContent = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
